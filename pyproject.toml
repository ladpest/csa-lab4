[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "B", "C4", "SIM", "UP", "RUF"]
ignore = [
    "E501",  # long golden-test strings and trace formatting are easier to read as one line
]

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
warn_unreachable = true
warn_unused_ignores = true
